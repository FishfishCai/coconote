<!doctype html>
<html lang="en" prefix="og: https://ogp.me/ns#">
    <head>
        <meta charset="utf-8" />
        <meta
            content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"
            name="viewport"
        />
        <base href="/" />
        <meta
            content="#e1e1e1"
            media="(prefers-color-scheme: light)"
            name="theme-color"
        />
        <meta
            content="#262626"
            media="(prefers-color-scheme: dark)"
            name="theme-color"
        />
        <meta content="no-referrer" name="referrer" />

        <title>Coconote</title>

        <link href="data:," rel="icon" />
        <script>
            // Set data-theme before CSS applies so the first paint already
            // matches the user's preference (no light->dark flash).
            (function () {
                var saved = null;
                try { saved = localStorage.getItem("coconote.darkMode"); } catch (e) {}
                var dark = saved === "1" ||
                    (saved === null && matchMedia("(prefers-color-scheme: dark)").matches);
                document.documentElement.dataset.theme = dark ? "dark" : "light";
            })();
        </script>
        <link href=".client/main.css" rel="stylesheet" />
        <script src=".client/client.js" type="module"></script>
    </head>

    <body>
        <div id="coconote-root">
            <div id="coconote-main">
                <div id="coconote-editor">
                    <div class="cm-editor">
                        <div class="cm-content">{{.Content | markdown}}</div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
